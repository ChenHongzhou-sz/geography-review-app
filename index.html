<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var url = new URL(window.location.href);
        var redirectPath = url.searchParams.get("redirect");

        if (!redirectPath) {
          return;
        }

        var nextPath = redirectPath.replace(/^\/+/, "");
        window.history.replaceState(null, "", nextPath);
      })();
    </script>
    <script>
      (function () {
        var basePath = "%BASE_URL%";
        var normalizedBase = basePath.charAt(basePath.length - 1) === "/" ? basePath : basePath + "/";
        var reloadFlag = "geomemory-sw-cleanup-v1";

        function markReloaded() {
          try {
            if (window.sessionStorage.getItem(reloadFlag)) {
              return false;
            }

            window.sessionStorage.setItem(reloadFlag, "1");
            return true;
          } catch (_error) {
            return false;
          }
        }

        function clearMatchingCaches() {
          if (!("caches" in window)) {
            return Promise.resolve(false);
          }

          return caches.keys().then(function (keys) {
            var matchedKeys = keys.filter(function (key) {
              return key.indexOf("geomemory-shell-") === 0;
            });

            if (matchedKeys.length === 0) {
              return false;
            }

            return Promise.all(
              matchedKeys.map(function (key) {
                return caches.delete(key);
              })
            ).then(function () {
              return true;
            });
          });
        }

        function unregisterMatchingWorkers() {
          if (!("serviceWorker" in navigator)) {
            return Promise.resolve(false);
          }

          return navigator.serviceWorker.getRegistrations().then(function (registrations) {
            var matched = registrations.filter(function (registration) {
              try {
                return new URL(registration.scope).pathname.indexOf(normalizedBase) === 0;
              } catch (_error) {
                return false;
              }
            });

            if (matched.length === 0) {
              return false;
            }

            return Promise.all(
              matched.map(function (registration) {
                return registration.unregister();
              })
            ).then(function () {
              return true;
            });
          });
        }

        Promise.all([unregisterMatchingWorkers(), clearMatchingCaches()])
          .then(function (results) {
            if ((results[0] || results[1]) && markReloaded()) {
              window.location.reload();
            }
          })
          .catch(function () {
            // Ignore partially-cached mobile browser states.
          });
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="GeoMemory 地理训练营，一个面向手机与 iPad 的七年级地理单元训练 Web App。"
    />
    <meta name="theme-color" content="#2284ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GeoMemory" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <title>GeoMemory 地理训练营</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
