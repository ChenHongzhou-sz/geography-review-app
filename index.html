<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c65a2e">
  <title>七年级地理复习地图</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero panel">
      <div class="hero-copy">
        <p class="eyebrow">Grade 7 Geography Review</p>
        <h1>七年级地理复习地图</h1>
        <p class="hero-text">
          按教材章节复习知识卡、基础题和书写题，并用完成度、错题和回炉节奏观察复习进展。
        </p>
        <div class="hero-meta">
          <span>上下册完整目录</span>
          <span>知识卡 + 基础题 + 读图训练 + 书写题</span>
          <span>本地自动保存</span>
        </div>
      </div>
      <div class="hero-progress">
        <div class="progress-ring" id="overall-ring" aria-hidden="true">
          <div class="progress-ring-inner">
            <strong id="overall-progress-value">0%</strong>
            <span>总完成度</span>
          </div>
        </div>
      </div>
    </header>

    <section class="stat-grid" id="stats-panel">
      <article class="stat-card panel">
        <span class="stat-label">已掌握课次</span>
        <strong class="stat-value" id="mastered-count">0 / 0</strong>
        <p class="stat-note">知识卡、基础题、读图训练、书写题全部完成</p>
      </article>
      <article class="stat-card panel">
        <span class="stat-label">今日建议复习</span>
        <strong class="stat-value" id="due-count">0</strong>
        <p class="stat-note">包含易错课次和到期回炉内容</p>
      </article>
      <article class="stat-card panel">
        <span class="stat-label">当前错题</span>
        <strong class="stat-value" id="wrong-count">0</strong>
        <p class="stat-note">答错后会自动进入错题本</p>
      </article>
      <article class="stat-card panel">
        <span class="stat-label">最近学习</span>
        <strong class="stat-value" id="last-study-date">还没开始</strong>
        <p class="stat-note">进度保存在浏览器本地</p>
      </article>
    </section>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel" id="today-panel">
          <div class="section-heading">
            <h2>今日复习</h2>
            <p>优先看易错题和到期回炉内容。</p>
          </div>
          <div id="today-list" class="stack-list"></div>
        </section>

        <section class="panel" id="catalog-panel">
          <div class="section-heading">
            <h2>教材目录</h2>
            <p>按掌握度筛选，快速切换到目标课次。</p>
          </div>
          <div class="catalog-tools">
            <label class="search-box">
              <span class="visually-hidden">搜索课次</span>
              <input id="search-input" type="search" placeholder="搜索章节、课题、关键词">
            </label>
            <select id="status-filter" aria-label="按掌握度筛选">
              <option value="all">全部状态</option>
              <option value="未学">未学</option>
              <option value="已练">已练</option>
              <option value="易错">易错</option>
              <option value="已掌握">已掌握</option>
            </select>
          </div>
          <div id="catalog-tree" class="catalog-tree"></div>
        </section>
      </aside>

      <section class="content">
        <section class="panel" id="lesson-panel"></section>

        <div class="secondary-grid">
          <section class="panel" id="wrongbook-panel"></section>
          <section class="panel" id="review-panel"></section>
        </div>
      </section>
    </main>
  </div>

  <script src="data/lessons.js"></script>
  <script src="data/mapTasks.js"></script>
  <script src="app.js"></script>
</body>
</html>
