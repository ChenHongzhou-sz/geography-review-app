<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoMemory Redirecting</title>
  </head>
  <body>
    <script>
      (function () {
        var basePath = "/geography-review-app/";
        var relativePath = window.location.pathname.startsWith(basePath)
          ? window.location.pathname.slice(basePath.length)
          : window.location.pathname.replace(/^\/+/, "");
        var redirectTarget =
          relativePath + window.location.search + window.location.hash;

        window.location.replace(
          window.location.origin +
            basePath +
            "?redirect=" +
            encodeURIComponent(redirectTarget)
        );
      })();
    </script>
  </body>
</html>
